<DOCTYPE html>
    <html>
        <head>
            <title>Debounce Search</title>
       
        <style>
            body{
                font-family:Arial;
                text-align:center;
                margin-top:100px;
            }
            input{
                padding:10px;
                width:300px;
                font-size:16px;
            }
            #result{
                margin-top:20px;
                font-size:18px;
                color:blue;
            }
        </style>
         </head>
         <body>
            <h2>Search (Debounce Example) </h2>
            <input type="text" id="search" placeholder="Type something...."/>
            <div id="result"></div>
         </body>
         <script>
            let timeoutId;
            document.getElementById("search").addEventListener("input",function(e){
                clearTimeout(timeoutId);
                timeoutId=setTimeout(()=>{
                    document.getElementById("result").innerText="Searching for: " + e.target.value;
                },500)
            })
         </script>
    </html>
</DOCTYPE>
