<DOCTYPE html>
    <html>
        <head>
            <h1>Toast</h1>
        </head>
        <style>
            #toast{
                background:black;
                color:white;
                position:fixed;
                bottom:20px;
                right:20px;
                display:none;
                padding:15px;
                border-radius: 5px;

            }
            button{
                padding:10px;
                font-size:16px;
            }

        </style>
        <body>
            <button onclick="showToast()">Show Toast </button>
            <div id="toast">Saved Successfully</div>
        </body>
        <script>
                let timeoutId;
            function showToast(){
            
                const toast=document.getElementById("toast")
                toast.style.display="block";
                clearTimeout(timeoutId);
                setTimeout(()=>{
                    toast.style.display="none"
                },3000)
            }
        </script>
    </html>
</DOCTYPE>
